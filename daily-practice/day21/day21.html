<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 21</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <label for="products">Choose a product:</label>
    
    <input type="text">


    <select name="products" id="products">
        <option value="">-- Please Select --</option>
        <option value="phones">Phones</option>
        <option value="laptops">Laptops</option>
        <option value="tablets">Tablets</option>
        <option value="audio">Audio</option>

    </select>


    <ul>
        <li></li>
    </ul>
    <p></p>



    <script>
        const products = [
            { name: "iPhone 15", category: "phones", price: 999 },
            { name: "Samsung Galaxy", category: "phones", price: 850 },
            { name: "MacBook Pro", category: "laptops", price: 2499 },
            { name: "Dell XPS", category: "laptops", price: 1799 },
            { name: "iPad Air", category: "tablets", price: 749 },
            { name: "Samsung Tab", category: "tablets", price: 650 },
            { name: "AirPods Pro", category: "audio", price: 249 },
            { name: "Sony WH-1000XM5", category: "audio", price: 399 }
        ];
       

        const input = document.querySelector("input");
        const list = document.querySelector("ul");
        const dropdown = document.querySelector("#products");
        const p = document.querySelector("p");

        
        function displayResults(){
            const filtered = products.filter(product => {

                const name = product.name.toLowerCase().includes(input.value.toLowerCase());
                const drop = dropdown.value === "" || product.category === dropdown.value;

                return name && drop;
            });

            if(filtered.length === 0){
                p.textContent = "NO matches found!";
                list.innerHTML = "";
            }
            else{   
                const html = filtered.map(product => {
                    return `<li>${product.name} - ${product.category} ($${product.price})</li>`;
                }).join("");

                list.innerHTML = html;
                p.textContent = "";
            }
        }


        input.addEventListener("keyup", displayResults);
        input.addEventListener("change", displayResults);
        dropdown.addEventListener("change", displayResults);


        displayResults();

    </script>
</body>
</html>
