<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>

    <style>
        body{
            background-color: black;
            color: white;
        }

        h1{
            font-family: Georgia, 'Times New Roman', Times, serif;
            animation: colorChange 4s infinite;
        }

        .container{
            max-width: 80vw;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        input{
            margin-top: 10%;;
            width: 70%;
            height: 50px;
            border-radius: 50px;
            border-width: 4px;
            border-style: solid;
            animation: colorChange 4s infinite;
            text-align: center;
            font-size: 30px;
        }

        @keyframes colorChange {
            0%   { border-color: red; color: red;}
            33%  { border-color: blue; color: blue;}
            66%  { border-color: green; color: green;}
            100% { border-color: red; color: red;} 
        }

        .start, .stop, .reset {
            width: 70px;
            height: 30px;
            border-radius: 20px;
            margin-top: 10px;
            background-color: grey;
            color: white;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <input type="number">

        <div class="buttons">
            <button type="button" class="start">Start</button>
            <button type="button" class="stop">Stop</button>
            <button type="button" class="reset">Reset</button>
        </div>

        <div class=" show">
            <h1></h1>
        </div>
    </div>


    <script>
        const input = document.querySelector("input");
        const start = document.querySelector(".start");
        const stopped = document.querySelector(".stop");
        const reset = document.querySelector(".reset");
        let display = document.querySelector("h1");
        let totalSeconds = 0;
        let remaining = 0;
        let timer = null;
        let mins = 0;
        let sec = 0;

        function countDown(){
            totalSeconds = Number(input.value);
            remaining = totalSeconds;
            mins = Math.floor(remaining / 60);
            sec = remaining % 60;
            display.textContent = `${String(mins).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
            //console.log(event.data)
        }

        function startTimer(){
            timer = setInterval(()=>{
                remaining--;
                mins = Math.floor(remaining / 60);
                sec = remaining % 60;
                display.textContent = `${String(mins).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
                if(remaining == 0){
                    clearInterval(timer);
                    timer = null;
                    display.textContent = "Times's Up!";
                }
            }, 1000);
        }

        function stopTimer(){
            clearInterval(timer);
            timer = null;
        }

        function resetTimer(){
            clearInterval(timer);
            timer = null;

            remaining = totalSeconds;

            mins = Math.floor(remaining / 60);
            sec = remaining % 60;

            display.textContent = `${String(mins).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
        }

        input.addEventListener("input", countDown);
        start.addEventListener("click", startTimer);
        stopped.addEventListener("click", stopTimer);
        reset.addEventListener("click", resetTimer);

    </script>
</body>
</html>
